name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck and Nitrogen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - run: yarn typecheck
      - run: yarn exec nitrogen --logLevel=error
      - name: Ensure generated sources are committed
        working-directory: ${{ github.workspace }}
        run: git diff --exit-code
      - name: Verify publishable build (bob → lib/)
        run: yarn build:js
