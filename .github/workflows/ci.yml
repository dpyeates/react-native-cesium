name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck and Nitrogen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npx nitrogen --logLevel=error
      - name: Ensure generated sources are committed
        working-directory: ${{ github.workspace }}
        run: git diff --exit-code
      - name: Verify publishable build (bob → lib/)
        run: npm run build
